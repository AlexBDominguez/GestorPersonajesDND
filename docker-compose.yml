services:
  # Base de datos MySQL
  mysql-db:
    image: mysql:8.0
    container_name: dnd-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dnd_root_password}
      MYSQL_DATABASE: dnd_character_manager
      MYSQL_USER: ${MYSQL_USER:-dnd_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dnd_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - dnd-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-dnd_root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicación Spring Boot
  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dnd-spring-app
    restart: unless-stopped
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/dnd_character_manager?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-dnd_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-dnd_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: true
      SPRING_AUTOCONFIGURE_EXCLUDE: org.springframework.boot.autoconfigure.r2dbc.R2dbcAutoConfiguration,org.springframework.boot.autoconfigure.r2dbc.R2dbcDataAutoConfiguration,org.springframework.boot.autoconfigure.r2dbc.R2dbcTransactionManagerAutoConfiguration
    ports:
      - "8081:8080"
    networks:
      - dnd-network

networks:
  dnd-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
