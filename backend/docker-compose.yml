version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: dnd-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: dnd_character_manager
      MYSQL_USER: ${MYSQL_USER:-dnd_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dnd_password}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - ./mysql-data:/var/lib/mysql
    networks:
      - dnd-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: dnd-backend
    restart: unless-stopped
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/dnd_character_manager?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-dnd_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-dnd_password}
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    networks:
      - dnd-network

networks:
  dnd-network:
    driver: bridge
